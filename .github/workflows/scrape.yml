name: Hourly Rate Scraper

on:
  workflow_dispatch: # cron-job.org triggers this every 15 min at :00, :15, :30, :45 UTC

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 14

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Indonesia IDR
            script: run-idr.js
          - name: Thailand THB
            script: run-thb.js
          - name: Mongolia MNT
            script: run-mnt.js
          - name: Vietnam VND
            script: run-vnd.js
          - name: Nepal NPR
            script: run-npr.js
          - name: China CNY
            script: run-cny.js
          - name: Cambodia KHM
            script: run-khm.js
          - name: Myanmar MMK
            script: run-mmk.js
          - name: Philippines PHP
            script: run-php.js
          - name: Pakistan PKR
            script: run-pkr.js
          - name: Laos LAK
            script: run-lak.js
          - name: Laos USD
            script: run-lak-usd.js
          - name: Sri Lanka LKR
            script: run-lkr.js
          - name: India INR
            script: run-inr.js
          - name: Timor Leste USD
            script: run-tls.js
          - name: Bangladesh BDT
            script: run-bdt.js
          - name: Uzbekistan USD
            script: run-uzb.js
          - name: Uzbekistan UZS Card
            script: run-uzb-card.js
          - name: Russia RUB
            script: run-rub.js
          - name: Kazakhstan USD
            script: run-kzt.js
          - name: Kyrgyzstan USD
            script: run-kgs.js
          - name: Kyrgyzstan KGS Card
            script: run-kgs-card.js
          - name: Ghana GHS
            script: run-ghs.js
          - name: South Africa ZAR
            script: run-zar.js
          - name: Canada CAD
            script: run-cad.js
          - name: Nigeria NGN
            script: run-ngn.js

    defaults:
      run:
        working-directory: scraper

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('scraper/package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run scraper (${{ matrix.name }})
        id: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        shell: bash
        run: |
          set -o pipefail
          node ${{ matrix.script }} 2>&1 | tee scraper_output.log
          if grep -q "실패한 스크래퍼" scraper_output.log; then
            echo "has_failures=true" >> $GITHUB_OUTPUT

            # Extract failure count
            FAIL_COUNT=$(grep -o '[0-9]*개' scraper_output.log | tail -1 | grep -o '[0-9]*')
            echo "fail_count=${FAIL_COUNT:-0}" >> $GITHUB_OUTPUT

            # Build HTML table rows from failure lines
            TABLE_ROWS=$(grep "^   - " scraper_output.log | while IFS= read -r line; do
              OP=$(echo "$line" | sed 's/^   - \([^:]*\):.*/\1/')
              MSG=$(echo "$line" | sed 's/^   - [^:]*: //' | sed 's/&/\&amp;/g;s/</\&lt;/g;s/>/\&gt;/g')
              echo "<tr><td style=\"padding:8px 12px;border-bottom:1px solid #e2e8f0;font-weight:500;\">${OP}</td><td style=\"padding:8px 12px;border-bottom:1px solid #e2e8f0;color:#dc2626;font-size:12px;\">${MSG}</td></tr>"
            done)

            {
              echo "table_rows<<HEREDOC"
              echo "$TABLE_ROWS"
              echo "HEREDOC"
            } >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
          fi

      - name: Send failure notification email
        if: steps.scraper.outputs.has_failures == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_EMAIL }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Scraper Failure: ${{ matrix.name }} (${{ steps.scraper.outputs.fail_count }} failed)"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.NOTIFY_EMAIL }}
          html_body: |
            <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;max-width:700px;margin:0 auto;">
              <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:16px 20px;margin-bottom:20px;">
                <h2 style="color:#991b1b;margin:0 0 4px 0;font-size:18px;">Scraper Partial Failure — ${{ matrix.name }}</h2>
                <p style="color:#b91c1c;margin:0;font-size:13px;">${{ steps.scraper.outputs.fail_count }} operator(s) failed during the scrape run.</p>
              </div>
              <table style="width:100%;border-collapse:collapse;font-size:13px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;">
                <thead>
                  <tr style="background:#f8fafc;">
                    <th style="padding:10px 12px;text-align:left;border-bottom:2px solid #e2e8f0;color:#475569;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">Operator</th>
                    <th style="padding:10px 12px;text-align:left;border-bottom:2px solid #e2e8f0;color:#475569;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">Error Message</th>
                  </tr>
                </thead>
                <tbody>
                  ${{ steps.scraper.outputs.table_rows }}
                </tbody>
              </table>
              <p style="margin-top:16px;font-size:13px;">
                <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="color:#2563eb;text-decoration:none;">View Actions Run →</a>
                &nbsp;&nbsp;|&nbsp;&nbsp;
                <a href="https://gme-competitors-rate.vercel.app/settings" style="color:#2563eb;text-decoration:none;">Open Dashboard →</a>
              </p>
              <hr style="border:none;border-top:1px solid #e2e8f0;margin:24px 0;" />
              <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:16px 20px;margin-bottom:20px;">
                <h2 style="color:#991b1b;margin:0 0 4px 0;font-size:18px;">스크래퍼 부분 실패 — ${{ matrix.name }}</h2>
                <p style="color:#b91c1c;margin:0;font-size:13px;">스크래핑 중 ${{ steps.scraper.outputs.fail_count }}개 운영사가 실패했습니다.</p>
              </div>
              <table style="width:100%;border-collapse:collapse;font-size:13px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;">
                <thead>
                  <tr style="background:#f8fafc;">
                    <th style="padding:10px 12px;text-align:left;border-bottom:2px solid #e2e8f0;color:#475569;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">운영사</th>
                    <th style="padding:10px 12px;text-align:left;border-bottom:2px solid #e2e8f0;color:#475569;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;">오류 메시지</th>
                  </tr>
                </thead>
                <tbody>
                  ${{ steps.scraper.outputs.table_rows }}
                </tbody>
              </table>
              <p style="margin-top:16px;font-size:13px;">
                <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="color:#2563eb;text-decoration:none;">Actions 실행 확인 →</a>
                &nbsp;&nbsp;|&nbsp;&nbsp;
                <a href="https://gme-competitors-rate.vercel.app/settings" style="color:#2563eb;text-decoration:none;">대시보드 열기 →</a>
              </p>
              <p style="color:#94a3b8;font-size:11px;margin-top:24px;">This is an automated notification from GME Competitors Rate Dashboard.</p>
            </div>
