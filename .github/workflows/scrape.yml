name: Hourly Rate Scraper

on:
  workflow_dispatch: # cron-job.org triggers this every 15 min at :00, :15, :30, :45 UTC

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 14

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Indonesia IDR
            script: run-idr.js
          - name: Thailand THB
            script: run-thb.js
          - name: Mongolia MNT
            script: run-mnt.js
          - name: Vietnam VND
            script: run-vnd.js
          - name: Nepal NPR
            script: run-npr.js
          - name: China CNY
            script: run-cny.js
          - name: Cambodia KHM
            script: run-khm.js
          - name: Myanmar MMK
            script: run-mmk.js
          - name: Philippines PHP
            script: run-php.js
          - name: Pakistan PKR
            script: run-pkr.js
          - name: Laos LAK
            script: run-lak.js
          - name: Laos USD
            script: run-lak-usd.js
          - name: Sri Lanka LKR
            script: run-lkr.js
          - name: India INR
            script: run-inr.js
          - name: Timor Leste USD
            script: run-tls.js
          - name: Bangladesh BDT
            script: run-bdt.js
          - name: Uzbekistan USD
            script: run-uzb.js
          - name: Uzbekistan UZS Card
            script: run-uzb-card.js
          - name: Russia RUB
            script: run-rub.js
          - name: Kazakhstan USD
            script: run-kzt.js
          - name: Kyrgyzstan USD
            script: run-kgs.js
          - name: Kyrgyzstan KGS Card
            script: run-kgs-card.js
          - name: Ghana GHS
            script: run-ghs.js
          - name: South Africa ZAR
            script: run-zar.js
          - name: Canada CAD
            script: run-cad.js
          - name: Nigeria NGN
            script: run-ngn.js

    defaults:
      run:
        working-directory: scraper

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('scraper/package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run scraper (${{ matrix.name }})
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        # Per-corridor failures are persisted to scraper_failure_log by logFailure().
        # The aggregated hourly digest is sent by the separate `notify` job below.
        run: node ${{ matrix.script }}

  # Aggregates failures from ALL corridors logged this clock-hour and sends ONE
  # email. Runs once per 15-min trigger, but failure_notification_log's UNIQUE
  # hour_key caps it at one email per hour (option A: first failing run sends).
  notify:
    needs: scrape
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: scraper

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Send hourly failure digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node notify-failures.js
